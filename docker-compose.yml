version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: campus-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=campusdb
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: campus-redis
    ports:
      - '6379:6379'
  app:
    build: .
    container_name: campus-app
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/campusdb
      - JWT_SECRET=supersecret
      - CLOUDINARY_CLOUD_NAME=mycloud
      - CLOUDINARY_API_KEY=example
      - CLOUDINARY_API_SECRET=example
    depends_on:
      - postgres
      - redis
volumes:
  postgres-data:
